# Supabase local development configuration
# https://supabase.com/docs/guides/cli/config

project_id = "slipify"

[api]
enabled     = true
port        = 54321
schemas     = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows    = 1000

[api.tls]
enabled = false

[db]
port            = 54322
shadow_port     = 54320
major_version   = 15

[db.pooler]
enabled          = false
port             = 54329
pool_mode        = "transaction"
default_pool_size = 20
max_client_conn  = 100

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port    = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled  = true
port     = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled                  = true
site_url                 = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://slipify.app"]
jwt_expiry               = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval  = 10
enable_signup            = true
enable_anonymous_sign_ins = false
minimum_password_length  = 8

[auth.email]
enable_signup             = true
double_confirm_changes    = true
enable_confirmations      = false

[auth.sms]
enable_signup        = false
enable_confirmations = false

[auth.external.google]
enabled      = true
client_id    = "env(GOOGLE_OAUTH_CLIENT_ID)"
secret       = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
redirect_uri = ""
url          = ""

[analytics]
enabled     = false
port        = 54327
vector_port = 54328
backend     = "postgres"

[edge_runtime]
enabled        = true
policy         = "oneshot"
inspector_port = 8083

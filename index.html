  .text-muted-fg { color: hsl(var(--muted-fg)); }
  .bg-bg { background-color: hsl(var(--bg)); }

  .bg-muted { background-color: hsl(var(--muted)); }

  .border-sidebar { border-color: hsl(var(--sidebar-border)); }

<script type="text/babel" data-presets="env,react">
// Shared UI primitives + language/theme contexts

const { createContext, useContext, useState, useEffect, useRef, useCallback, useMemo } = React;

// ---------- i18n ----------
const STRINGS = {
  th: {
    appTagline: 'ระบบจัดการเอกสารบัญชีอัจฉริยะ',
    login: 'เข้าสู่ระบบ', register: 'สมัครสมาชิก',
    dashboard: 'แดชบอร์ด', documents: 'เอกสาร', reports: 'รายงาน', tax: 'ภาษี',
    billing: 'การชำระเงิน', members: 'สมาชิก', integrations: 'การเชื่อมต่อ', settings: 'ตั้งค่า',
    quickUpload: 'อัปโหลดด่วน',
    pending: 'รอดำเนินการ', processing: 'กำลังประมวลผล', reviewing: 'รอตรวจสอบ',
    approved: 'อนุมัติแล้ว', pushed: 'ส่งเข้าบัญชีแล้ว', failed: 'ล้มเหลว', rejected: 'ปฏิเสธ',
  },
  en: {
    appTagline: 'Smart accounting document workspace',
    login: 'Sign in', register: 'Sign up',
    dashboard: 'Dashboard', documents: 'Documents', reports: 'Reports', tax: 'Tax',
    billing: 'Billing', members: 'Members', integrations: 'Integrations', settings: 'Settings',
    quickUpload: 'Quick upload',
    pending: 'Pending', processing: 'Processing', reviewing: 'Reviewing',
    approved: 'Approved', pushed: 'Pushed', failed: 'Failed', rejected: 'Rejected',
  },
};
const LangCtx = createContext({ lang: 'th', setLang: () => {} });
const useLang = () => useContext(LangCtx);
const t = (lang, key) => (STRINGS[lang] && STRINGS[lang][key]) || key;

// ---------- Theme ----------
const ThemeCtx = createContext({ theme: 'system', resolved: 'light', setTheme: () => {} });
const useTheme = () => useContext(ThemeCtx);

function ThemeProvider({ children }) {
  const [theme, setTheme] = useState(() => localStorage.getItem('slippy.theme') || 'system');
  const [resolved, setResolved] = useState('light');
  useEffect(() => {
    const mq = window.matchMedia('(prefers-color-scheme: dark)');
    const apply = () => {
      const r = theme === 'system' ? (mq.matches ? 'dark' : 'light') : theme;
      setResolved(r);
      document.documentElement.classList.toggle('dark', r === 'dark');
    };
    apply();
    mq.addEventListener('change', apply);
    localStorage.setItem('slippy.theme', theme);
    return () => mq.removeEventListener('change', apply);
  }, [theme]);
  return <ThemeCtx.Provider value={{ theme, resolved, setTheme }}>{children}</ThemeCtx.Provider>;
}

function LangProvider({ children }) {
  const [lang, setLang] = useState(() => localStorage.getItem('slippy.lang') || 'th');
  useEffect(() => { localStorage.setItem('slippy.lang', lang); document.documentElement.lang = lang; }, [lang]);
  return <LangCtx.Provider value={{ lang, setLang, t: (k) => t(lang, k) }}>{children}</LangCtx.Provider>;
}

// ---------- Toast ----------
const ToastCtx = createContext({ toast: () => {} });
const useToast = () => useContext(ToastCtx);

function ToastProvider({ children }) {
  const [items, setItems] = useState([]);
  const toast = useCallback((msg, opts = {}) => {
    const id = Math.random().toString(36).slice(2);
    setItems((it) => [...it, { id, msg, kind: opts.kind || 'info' }]);
    setTimeout(() => setItems((it) => it.filter((x) => x.id !== id)), 3500);
  }, []);
  return (
    <ToastCtx.Provider value={{ toast }}>
      {children}
      <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 w-80 pointer-events-none">
        {items.map((it) => (
          <div key={it.id} className="pointer-events-auto bg-card border border-default rounded-[10px] shadow-lg p-3.5 flex items-start gap-3 animate-slide-in-right">
            <div className={"h-8 w-8 rounded-full shrink-0 flex items-center justify-center " +
              (it.kind === 'success' ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-500/15 dark:text-emerald-400' :
               it.kind === 'error' ? 'bg-rose-100 text-rose-600 dark:bg-rose-500/15 dark:text-rose-400' :
               'bg-brand-100 text-brand-600 dark:bg-brand-500/15 dark:text-brand-400')}>
              {it.kind === 'success' ? <Icon.CheckCircle size={16}/> : it.kind === 'error' ? <Icon.XCircle size={16}/> : <Icon.Info size={16}/>}
            </div>
            <div className="text-sm leading-snug pt-0.5">{it.msg}</div>
          </div>
        ))}
      </div>
    </ToastCtx.Provider>
  );
}

// ---------- Logo ----------
// "Slippy" mark — a vibrant violet→pink squircle cradling a tilted paper slip with
// a tiny friendly face. Playful enough for teens, mascot-y enough for general users,
// and clean enough to keep credibility with working professionals.
let __logoUid = 0;
function LogoMark({ size = 32, className = '', glow = false }) {
  const uid = useMemo(() => 'lg' + (++__logoUid), []);
  return (
    <span className={"relative inline-flex shrink-0 " + className} style={{ width: size, height: size }}>
      {glow ? <span className="absolute inset-0 rounded-[28%] bg-brand-500/50 blur-xl"></span> : null}
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" className="relative w-full h-full">
        <defs>
          <linearGradient id={`bg-${uid}`} x1="2" y1="2" x2="46" y2="46" gradientUnits="userSpaceOnUse">
            <stop offset="0" stopColor="#8b5cf6"/>
            <stop offset="0.5" stopColor="#6366f1"/>
            <stop offset="1" stopColor="#ec4899"/>
          </linearGradient>
          <radialGradient id={`shine-${uid}`} cx="0.2" cy="0.15" r="0.85">
            <stop offset="0" stopColor="#ffffff" stopOpacity="0.5"/>
            <stop offset="0.5" stopColor="#ffffff" stopOpacity="0.05"/>
            <stop offset="1" stopColor="#ffffff" stopOpacity="0"/>
          </radialGradient>
          <linearGradient id={`slip-${uid}`} x1="14" y1="13" x2="34" y2="33" gradientUnits="userSpaceOnUse">
            <stop offset="0" stopColor="#ffffff"/>
            <stop offset="1" stopColor="#f1f5f9"/>
          </linearGradient>
        </defs>
        {/* Squircle bg */}
        <path d="M24 2C9.5 2 2 9.5 2 24S9.5 46 24 46 46 38.5 46 24 38.5 2 24 2z" fill={`url(#bg-${uid})`}/>
        <path d="M24 2C9.5 2 2 9.5 2 24S9.5 46 24 46 46 38.5 46 24 38.5 2 24 2z" fill={`url(#shine-${uid})`}/>
        {/* Tilted paper slip with a friendly face */}
        <g transform="rotate(-7 24 24)">
          {/* slip body — soft drop shadow */}
          <path d="M16.5 12.5 L31.5 12.5 Q34 12.5 34 15 L34 30 L31.7 32.6 L29.5 30 L27.2 32.6 L25 30 L22.8 32.6 L20.5 30 L18.3 32.6 L16 30 L14 32.6 L14 15 Q14 12.5 16.5 12.5 Z"
                fill="#1e1b4b" fillOpacity="0.18" transform="translate(0.6 0.9)"/>
          {/* slip body */}
          <path d="M16.5 12.5 L31.5 12.5 Q34 12.5 34 15 L34 30 L31.7 32.6 L29.5 30 L27.2 32.6 L25 30 L22.8 32.6 L20.5 30 L18.3 32.6 L16 30 L14 32.6 L14 15 Q14 12.5 16.5 12.5 Z"
                fill={`url(#slip-${uid})`}/>
          {/* eyes */}
          <circle cx="20.2" cy="20.2" r="1.45" fill="#1e1b4b"/>
          <circle cx="27.8" cy="20.2" r="1.45" fill="#1e1b4b"/>
          {/* cheek blush */}
          <circle cx="18.4" cy="24.2" r="1.2" fill="#fb7185" fillOpacity="0.55"/>
          <circle cx="29.6" cy="24.2" r="1.2" fill="#fb7185" fillOpacity="0.55"/>
          {/* smile */}
          <path d="M20 24.5 Q24 28 28 24.5" stroke="#1e1b4b" strokeWidth="1.7" strokeLinecap="round" fill="none"/>
        </g>
      </svg>
    </span>
  );
}

function Wordmark({ size = 22, className = '' }) {
  return <span className={"font-bold tracking-tight " + className} style={{ fontSize: size, letterSpacing: '-0.02em' }}>Slippy</span>;
}

// ---------- Button ----------
function Button({ variant = 'primary', size = 'md', className = '', children, leftIcon, rightIcon, ...rest }) {
  const sizes = { sm: 'h-8 px-3 text-xs', md: 'h-10 px-4 text-sm', lg: 'h-11 px-5 text-sm' };
  const variants = {
    primary: 'bg-brand-500 hover:bg-brand-600 active:bg-brand-700 text-white shadow-sm shadow-brand-500/20',
    secondary: 'bg-muted hover:bg-[hsl(var(--border))] text-fg',
    outline: 'border border-default hover:bg-muted text-fg',
    ghost: 'hover:bg-muted text-fg',
    destructive: 'bg-rose-500 hover:bg-rose-600 text-white',
  };
  return (
    <button className={"inline-flex items-center justify-center gap-2 rounded-[10px] font-medium transition-colors disabled:opacity-50 disabled:pointer-events-none " + sizes[size] + ' ' + variants[variant] + ' ' + className} {...rest}>
      {leftIcon}{children}{rightIcon}
    </button>
  );
}

// ---------- Input ----------
function Input({ className = '', leftIcon, ...rest }) {
  return (
    <div className="relative">
      {leftIcon ? <span className="absolute left-3 top-1/2 -translate-y-1/2 text-muted-fg pointer-events-none">{leftIcon}</span> : null}
      <input className={"w-full h-10 rounded-[10px] border border-default bg-card text-sm text-fg px-3 outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/15 placeholder:text-muted-fg/60 transition " + (leftIcon ? 'pl-10 ' : '') + className} {...rest} />
    </div>
  );
}
function Label({ children, className = '', htmlFor }) {
  return <label htmlFor={htmlFor} className={"text-xs font-medium text-fg mb-1.5 block " + className}>{children}</label>;
}

// ---------- Card ----------
function Card({ className = '', children, ...rest }) {
  return <div className={"bg-card border border-default rounded-[12px] " + className} {...rest}>{children}</div>;
}

// ---------- Badge ----------
function Badge({ tone = 'neutral', children, dot = false, className = '' }) {
  const tones = {
    neutral: 'bg-muted text-muted-fg',
    blue: 'bg-blue-50 text-blue-700 dark:bg-blue-500/10 dark:text-blue-300',
    amber: 'bg-amber-50 text-amber-700 dark:bg-amber-500/10 dark:text-amber-300',
    emerald: 'bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300',
    purple: 'bg-purple-50 text-purple-700 dark:bg-purple-500/10 dark:text-purple-300',
    rose: 'bg-rose-50 text-rose-700 dark:bg-rose-500/10 dark:text-rose-300',
    slate: 'bg-slate-100 text-slate-600 dark:bg-slate-500/10 dark:text-slate-300',
    brand: 'bg-brand-50 text-brand-700 dark:bg-brand-500/10 dark:text-brand-300',
  };
  const dotColor = { neutral:'bg-slate-400', blue:'bg-blue-500', amber:'bg-amber-500', emerald:'bg-emerald-500', purple:'bg-purple-500', rose:'bg-rose-500', slate:'bg-slate-500', brand:'bg-brand-500' };
  return (
    <span className={"inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-[11px] font-medium " + tones[tone] + ' ' + className}>
      {dot ? <span className={"h-1.5 w-1.5 rounded-full " + dotColor[tone]}></span> : null}
      {children}
    </span>
  );
}

// Status badge maps to the brand's status colors
function StatusBadge({ status }) {
  const map = {
    pending: { tone: 'slate', label: { th: 'รอดำเนินการ', en: 'Pending' } },
    processing: { tone: 'blue', label: { th: 'กำลังประมวลผล', en: 'Processing' } },
    reviewing: { tone: 'amber', label: { th: 'รอตรวจสอบ', en: 'Reviewing' } },
    approved: { tone: 'emerald', label: { th: 'อนุมัติแล้ว', en: 'Approved' } },
    pushed: { tone: 'purple', label: { th: 'ส่งเข้าบัญชี', en: 'Pushed' } },
    failed: { tone: 'rose', label: { th: 'ล้มเหลว', en: 'Failed' } },
    rejected: { tone: 'slate', label: { th: 'ปฏิเสธ', en: 'Rejected' } },
  };
  const { lang } = useLang();
  const s = map[status] || map.pending;
  return <Badge tone={s.tone} dot>{s.label[lang]}</Badge>;
}

// ---------- Modal ----------
function Modal({ open, onClose, children, size = 'md' }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => e.key === 'Escape' && onClose && onClose();
    window.addEventListener('keydown', onKey);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', onKey); document.body.style.overflow = ''; };
  }, [open, onClose]);
  if (!open) return null;
  const sizes = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-2xl', xl: 'max-w-4xl' };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4 animate-fade-in">
      <div className="absolute inset-0 bg-slate-950/60 backdrop-blur-sm" onClick={onClose}></div>
      <div className={"relative bg-card border border-default rounded-[14px] shadow-2xl w-full " + sizes[size]}>
        {children}
      </div>
    </div>
  );
}

// ---------- Formatting helpers ----------
const fmtTHB = (n) => '฿' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtN = (n) => Number(n).toLocaleString('en-US');
const fmtDate = (iso, lang = 'th') => {
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = lang === 'th' ? (d.getFullYear() + 543) : d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
};
const relTime = (iso, lang = 'th') => {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return lang === 'th' ? 'เมื่อสักครู่' : 'just now';
  if (diff < 3600) return lang === 'th' ? `${Math.floor(diff/60)} นาทีที่แล้ว` : `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return lang === 'th' ? `${Math.floor(diff/3600)} ชั่วโมงที่แล้ว` : `${Math.floor(diff/3600)}h ago`;
  if (diff < 604800) return lang === 'th' ? `${Math.floor(diff/86400)} วันที่แล้ว` : `${Math.floor(diff/86400)}d ago`;
  return fmtDate(iso, lang);
};

Object.assign(window, {
  LangCtx, useLang, t, ThemeCtx, useTheme, ThemeProvider, LangProvider,
  ToastCtx, useToast, ToastProvider,
  LogoMark, Wordmark, Button, Input, Label, Card, Badge, StatusBadge, Modal,
  fmtTHB, fmtN, fmtDate, relTime,
});
</script>

          <div className="px-3 text-[10.5px] uppercase tracking-wider text-muted-fg">{lang==='th'?'ตั้งค่า':'Settings'}</div>
        </div>
        {settings.map((it) => <NavItem key={it.id} item={it} active={route===it.id} onClick={() => { setRoute(it.id); onCloseMobile(); }} collapsed={collapsed} lang={lang}/>)}
      </nav>

      {/* User footer */}
      <div className="p-3 border-t border-sidebar">
        <div className={"flex items-center gap-2.5 p-1.5 rounded-[10px] " + (collapsed ? 'justify-center' : '')}>

          {!collapsed ? (<>
            <span className="flex-1 min-w-0">
              <span className="block text-[13px] font-semibold truncate">{user?.name || 'Demo User'}</span>

              <Icon.LogOut size={15}/>
            </button>
          </>) : null}

  );
}

function NavItem({ item, active, onClick, collapsed, lang }) {
  return (
    <button onClick={onClick} className={"w-full flex items-center gap-2.5 px-3 h-9 rounded-[8px] text-[13.5px] font-medium transition " + (active ? 'bg-brand-500/12 text-brand-600 dark:text-brand-300' : 'hover:bg-muted text-fg/80') + (collapsed ? ' justify-center px-0' : '')}>
      <span className={active ? 'text-brand-600 dark:text-brand-300' : 'text-muted-fg'}>{item.icon}</span>
      {!collapsed ? <span className="truncate">{lang==='th' ? item.th : item.en}</span> : null}
      {active && !collapsed ? <span className="ml-auto h-1.5 w-1.5 rounded-full bg-brand-500"></span> : null}
    </button>
  );
}

Object.assign(window, { AppShell });
</script>

function StatCard({ icon, label, value, delta, deltaPositive, tone = 'brand' }) {
  const tones = {
    brand: 'bg-brand-500/10 text-brand-600 dark:text-brand-300',
    amber: 'bg-amber-500/10 text-amber-600 dark:text-amber-300',
    emerald: 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-300',

function ActivityRow({ a, lang }) {

<script type="text/babel" data-presets="env,react">
// Documents list — filters + table + cards view
function DocumentsScreen({ openReview, openUpload }) {
  const { lang } = useLang();
  const [view, setView] = useState('table');
  const [status, setStatus] = useState('all');
  const [query, setQuery] = useState('');

  const filtered = SAMPLE_DOCS.filter(d => {
    if (status !== 'all' && d.status !== status) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!d.vendor.toLowerCase().includes(q) && !d.vendorEn.toLowerCase().includes(q) && !d.file.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const tabs = [
    { id:'all', th:'ทั้งหมด', en:'All' },
    { id:'reviewing', th:'รอตรวจสอบ', en:'Reviewing' },
    { id:'approved', th:'อนุมัติแล้ว', en:'Approved' },
    { id:'pushed', th:'ส่งเข้าบัญชี', en:'Pushed' },
    { id:'failed', th:'ล้มเหลว', en:'Failed' },
  ];

  return (
    <div className="p-6 lg:p-7 space-y-5 max-w-[1600px]">
      <div className="flex items-center gap-1 border-b border-default -mt-1">
        {tabs.map(t => {
          const count = t.id==='all' ? SAMPLE_DOCS.length : SAMPLE_DOCS.filter(d=>d.status===t.id).length;
          const active = status===t.id;
          return (
            <button key={t.id} onClick={()=>setStatus(t.id)}
              className={"px-3.5 h-10 text-[13.5px] font-medium border-b-2 -mb-px transition " + (active?'border-brand-500 text-fg':'border-transparent text-muted-fg hover:text-fg')}>
              {lang==='th'?t.th:t.en}
              <span className={"ml-2 inline-flex items-center min-w-[20px] justify-center h-[18px] px-1.5 rounded-full text-[11px] " + (active?'bg-brand-500/15 text-brand-600 dark:text-brand-300':'bg-muted text-muted-fg')}>{count}</span>
            </button>
          );
        })}
      </div>

      <div className="flex flex-wrap items-center gap-3">
        <div className="flex-1 min-w-[240px]">
          <Input value={query} onChange={(e)=>setQuery(e.target.value)} leftIcon={<Icon.Search size={16}/>} placeholder={lang==='th'?'ค้นหาผู้ขายหรือชื่อไฟล์...':'Search vendor or file...'}/>
        </div>
        <Button variant="outline" leftIcon={<Icon.Calendar size={15}/>}>{lang==='th'?'พ.ค. 2026':'May 2026'}</Button>
        <Button variant="outline" leftIcon={<Icon.Filter size={15}/>}>{lang==='th'?'ตัวกรอง':'Filters'}</Button>
        <div className="inline-flex p-0.5 bg-muted rounded-[10px]">
          <button onClick={()=>setView('table')} className={"h-8 px-2.5 rounded-[8px] text-xs font-medium flex items-center gap-1.5 " + (view==='table'?'bg-card text-fg shadow-sm':'text-muted-fg')}><Icon.Dashboard size={13}/>{lang==='th'?'ตาราง':'Table'}</button>
          <button onClick={()=>setView('card')} className={"h-8 px-2.5 rounded-[8px] text-xs font-medium flex items-center gap-1.5 " + (view==='card'?'bg-card text-fg shadow-sm':'text-muted-fg')}><Icon.Image size={13}/>{lang==='th'?'การ์ด':'Cards'}</button>
        </div>
        <Button leftIcon={<Icon.Upload size={15}/>} onClick={openUpload}>{lang==='th'?'อัปโหลด':'Upload'}</Button>
      </div>

      {view === 'table' ? <DocumentTable docs={filtered} openReview={openReview} lang={lang}/> : <DocumentCards docs={filtered} openReview={openReview} lang={lang}/>}

      {filtered.length === 0 ? (
        <Card className="p-16 text-center">
          <div className="inline-flex h-16 w-16 rounded-full bg-muted items-center justify-center mb-4"><Icon.Inbox size={28} className="text-muted-fg"/></div>
          <h3 className="text-base font-semibold text-fg">{lang==='th'?'ไม่พบเอกสารตามเงื่อนไข':'No documents match'}</h3>
          <p className="text-sm text-muted-fg mt-1">{lang==='th'?'ลองเปลี่ยน Filter หรือคำค้นหา':'Try adjusting filters or query'}</p>
        </Card>
      ) : null}
    </div>
  );
}

function SourceIcon({ source }) {
  if (source==='line') return <span className="inline-flex items-center gap-1 text-[10.5px] text-emerald-600 dark:text-emerald-400"><span className="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>LINE</span>;
  if (source==='email') return <span className="inline-flex items-center gap-1 text-[10.5px] text-blue-600 dark:text-blue-400"><Icon.Mail size={11}/>Email</span>;
  return <span className="inline-flex items-center gap-1 text-[10.5px] text-muted-fg"><Icon.Globe size={11}/>Web</span>;
}

function DocumentTable({ docs, openReview, lang }) {
  const [selected, setSelected] = useState(new Set());
  const toggle = (id) => { const n = new Set(selected); n.has(id)?n.delete(id):n.add(id); setSelected(n); };
  const allSelected = docs.length > 0 && docs.every(d => selected.has(d.id));

  return (
    <Card className="overflow-hidden">
      {selected.size > 0 ? (
        <div className="px-4 py-2.5 bg-brand-50 dark:bg-brand-500/10 flex items-center gap-3 border-b border-default">
          <span className="text-sm font-medium text-fg">{selected.size} {lang==='th'?'รายการที่เลือก':'selected'}</span>
          <Button size="sm" variant="outline" leftIcon={<Icon.Check size={13}/>}>{lang==='th'?'อนุมัติ':'Approve'}</Button>
          <Button size="sm" variant="outline" leftIcon={<Icon.Send size={13}/>}>{lang==='th'?'ส่งเข้าบัญชี':'Push to books'}</Button>
          <button onClick={()=>setSelected(new Set())} className="ml-auto text-xs text-muted-fg hover:text-fg">{lang==='th'?'ยกเลิก':'Clear'}</button>
        </div>
      ) : null}
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-[11.5px] uppercase tracking-wider text-muted-fg border-b border-default">
              <th className="pl-4 py-3 w-10">
                <input type="checkbox" checked={allSelected} onChange={(e)=>setSelected(e.target.checked?new Set(docs.map(d=>d.id)):new Set())} className="h-4 w-4 rounded border-[hsl(var(--border))] text-brand-500"/>
              </th>
              <th className="py-3 font-medium">{lang==='th'?'ผู้ขาย / ไฟล์':'Vendor / File'}</th>
              <th className="py-3 font-medium">{lang==='th'?'หมวดหมู่':'Category'}</th>
              <th className="py-3 font-medium text-right">{lang==='th'?'ยอดเงิน':'Amount'}</th>
              <th className="py-3 font-medium text-right">VAT</th>
              <th className="py-3 font-medium">{lang==='th'?'สถานะ':'Status'}</th>
              <th className="py-3 font-medium">{lang==='th'?'วันที่':'Date'}</th>
              <th className="py-3 pr-4 font-medium"></th>
            </tr>
          </thead>
          <tbody className="divide-y divide-[hsl(var(--border))]">
            {docs.map(d => (
              <tr key={d.id} className="hover:bg-muted/40 transition group cursor-pointer" onClick={()=>openReview(d)}>
                <td className="pl-4 py-3" onClick={e=>e.stopPropagation()}>
                  <input type="checkbox" checked={selected.has(d.id)} onChange={()=>toggle(d.id)} className="h-4 w-4 rounded border-[hsl(var(--border))] text-brand-500"/>
                </td>
                <td className="py-3">

function VendorCard({ v, lang, maxTotal }) {
  const sparkPts = useMemo(() => {
    let seed = v.id.charCodeAt(0) + v.id.charCodeAt(1);
    return Array.from({length: 12}).map((_, i) => {
      seed = (seed * 9301 + 49297) % 233280;
      return (seed / 233280) * 0.7 + 0.3;
    });
  }, [v.id]);
  const max = Math.max(...sparkPts), min = Math.min(...sparkPts);
  const w = 90, h = 26;
  const pts = sparkPts.map((p, i) => {
    const x = (i / (sparkPts.length - 1)) * w;
    const y = h - ((p - min) / (max - min || 1)) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' L ');
  const area = `M 0,${h} L ${pts} L ${w},${h} Z`;
  const trendPos = v.trend >= 0;

  return (
    <Card className="p-5 hover:shadow-md hover:border-brand-300 transition cursor-pointer group">
      <div className="flex items-start gap-3">

      </div>

      </div>

      <div className="mt-4 flex items-end justify-between gap-3">
        <div>
          <div className="text-[11px] uppercase tracking-wider text-muted-fg font-semibold">{lang==='th'?'ยอดรวมตลอด':'Lifetime spend'}</div>
          <div className="text-[20px] font-bold text-fg tabular-nums">{fmtTHB(v.total).replace('.00','')}</div>
          <div className="text-[11px] text-muted-fg tabular-nums mt-0.5">VAT {fmtTHB(v.vat).replace('.00','')}</div>
        </div>
        <div className="text-right">
          <svg viewBox={`0 0 ${w} ${h}`} width={w} height={h} className="opacity-90">
            <defs>
              <linearGradient id={`spark-${v.id}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stopColor={trendPos ? '#10b981' : '#ef4444'} stopOpacity="0.3"/>
                <stop offset="1" stopColor={trendPos ? '#10b981' : '#ef4444'} stopOpacity="0"/>
              </linearGradient>
            </defs>
            <path d={area} fill={`url(#spark-${v.id})`}/>
            <path d={`M ${pts}`} stroke={trendPos ? '#10b981' : '#ef4444'} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          <div className={"text-[11px] font-medium mt-0.5 inline-flex items-center gap-0.5 " + (trendPos ? 'text-emerald-600 dark:text-emerald-400' : 'text-rose-600 dark:text-rose-400')}>
            {v.trend > 0 ? <Icon.TrendUp size={11}/> : v.trend < 0 ? <Icon.TrendDown size={11}/> : null}
            {v.trend > 0 ? '+' : ''}{v.trend}%
          </div>
        </div>
      </div>

      <div className="mt-4 pt-3 border-t border-default flex items-center justify-between text-[11.5px] text-muted-fg">

}

// Document Review — split view: preview left, extracted data right
function ReviewScreen({ doc, onBack }) {
  const { lang } = useLang();
  const { toast } = useToast();
  const [zoom, setZoom] = useState(1);
  const [rot, setRot] = useState(0);
  const [page, setPage] = useState(1);
  const [data, setData] = useState({
    vendor: doc.vendor,
    invoiceNo: doc.invoiceNo,
    date: doc.date.slice(0,10),
    category: doc.category,
    netAmount: +(doc.amount - doc.vat).toFixed(2),
    vat: doc.vat,
    total: doc.amount,
    taxId: '0107561234567',
    notes: '',
  });
  const [items, setItems] = useState(SAMPLE_LINE_ITEMS);
  const conf = doc.confidence == null ? 0 : doc.confidence;
  const confTone = conf >= 0.9 ? 'emerald' : conf >= 0.7 ? 'amber' : 'rose';
  const confLabel = conf >= 0.9 ? (lang==='th'?'แม่นยำสูง':'High confidence') : conf >= 0.7 ? (lang==='th'?'ตรวจสอบก่อน':'Please verify') : (lang==='th'?'ความถูกต้องต่ำ':'Low confidence');

  const warnings = useMemo(() => {
    const w = [];
    const expectedVat = +(data.netAmount * 0.07).toFixed(2);
    if (Math.abs(expectedVat - data.vat) > 0.5) w.push({ tone:'amber', text: lang==='th' ? `VAT คำนวณไม่ตรง (คาด ${fmtTHB(expectedVat)})` : `VAT mismatch (expected ${fmtTHB(expectedVat)})` });
    if (new Date(data.date) > new Date()) w.push({ tone:'rose', text: lang==='th' ? 'วันที่ในเอกสารเป็นอนาคต' : 'Document date is in the future' });
    if (!data.invoiceNo || data.invoiceNo === '-') w.push({ tone:'amber', text: lang==='th' ? 'ไม่พบเลขใบกำกับ' : 'Invoice number missing' });
    return w;
  }, [data, lang]);

  const updateItem = (i, key, val) => {
    const next = [...items];
    next[i] = { ...next[i], [key]: val };
    setItems(next);
  };

  return (
    <div className="flex flex-col h-[calc(100vh-57px)]">
      {/* Sub-toolbar */}
      <div className="flex items-center gap-3 px-6 lg:px-7 py-3 border-b border-default bg-card/60 backdrop-blur">

          <Icon.ChevronLeft size={16}/> {lang==='th'?'กลับเอกสาร':'Back to documents'}
        </button>
        <div className="h-5 w-px bg-[hsl(var(--border))]"></div>
        <div className="flex items-center gap-2 min-w-0">
          <span className="h-9 w-9 rounded-[8px] bg-muted text-lg flex items-center justify-center shrink-0">{doc.thumb}</span>
          <div className="min-w-0">
            <div className="text-sm font-semibold text-fg truncate">{lang==='th'?doc.vendor:doc.vendorEn}</div>
            <div className="text-[11px] text-muted-fg truncate">{doc.file} · {doc.invoiceNo}</div>
          </div>
        </div>
        <div className="ml-auto flex items-center gap-2">
          <StatusBadge status={doc.status}/>
          <Badge tone={confTone} dot>{Math.round(conf*100)}% · {confLabel}</Badge>
        </div>
      </div>

      <div className="flex-1 grid grid-cols-1 lg:grid-cols-[1.4fr_1fr] min-h-0">
        {/* Left: Document preview */}
        <div className="flex flex-col border-r border-default bg-muted/40 min-h-0">
          <div className="flex items-center gap-1.5 px-4 py-2.5 border-b border-default bg-card">
            <button onClick={()=>setZoom(Math.max(0.5, +(zoom-0.25).toFixed(2)))} className="h-8 w-8 rounded-[8px] hover:bg-muted flex items-center justify-center"><Icon.ZoomOut size={15}/></button>
            <span className="text-xs font-medium text-muted-fg w-12 text-center">{Math.round(zoom*100)}%</span>
            <button onClick={()=>setZoom(Math.min(2, +(zoom+0.25).toFixed(2)))} className="h-8 w-8 rounded-[8px] hover:bg-muted flex items-center justify-center"><Icon.ZoomIn size={15}/></button>
            <div className="h-5 w-px bg-[hsl(var(--border))] mx-1"></div>
            <button onClick={()=>setRot((rot+90)%360)} className="h-8 w-8 rounded-[8px] hover:bg-muted flex items-center justify-center"><Icon.RotateCw size={15}/></button>
            <div className="h-5 w-px bg-[hsl(var(--border))] mx-1"></div>
            <div className="flex items-center gap-1 text-xs">
              <button onClick={()=>setPage(Math.max(1,page-1))} className="h-8 w-8 rounded-[8px] hover:bg-muted flex items-center justify-center"><Icon.ChevronLeft size={15}/></button>

              <button onClick={()=>setPage(page+1)} className="h-8 w-8 rounded-[8px] hover:bg-muted flex items-center justify-center"><Icon.ChevronRight size={15}/></button>

            <div className="flex-1"></div>

                {warnings.map((w, i) => (
                  <div key={i} className={"flex items-start gap-2.5 p-3 rounded-[10px] text-[12.5px] " + (w.tone==='rose' ? 'bg-rose-50 text-rose-800 dark:bg-rose-500/10 dark:text-rose-200' : 'bg-amber-50 text-amber-800 dark:bg-amber-500/10 dark:text-amber-200')}>
                    <Icon.AlertTriangle size={15} className="mt-0.5 shrink-0"/>
                    <span>{w.text}</span>
                  </div>
                ))}
              </div>

function MiniStat({ label, value, delta, tone='brand' }) {
  const tones = {
    brand:'text-brand-600 dark:text-brand-300', emerald:'text-emerald-600 dark:text-emerald-400',
    purple:'text-purple-600 dark:text-purple-400', amber:'text-amber-600 dark:text-amber-400',
  };
  const positive = !String(delta).startsWith('-');
  return (
    <Card className="p-4">
      <div className="text-[11.5px] uppercase tracking-wider text-muted-fg font-semibold">{label}</div>
      <div className="mt-2 text-[22px] font-bold text-fg tabular-nums">{value}</div>
      <div className={"mt-1 text-[12px] font-medium inline-flex items-center gap-1 " + (positive?'text-emerald-600 dark:text-emerald-400':'text-rose-600 dark:text-rose-400')}>
        {positive ? <Icon.TrendUp size={12}/> : <Icon.TrendDown size={12}/>}
        {delta}
      </div>
    </Card>
  );
}

function BarChart({ series }) {
  const w = 800, h = 220, pad = { l: 40, r: 12, t: 16, b: 28 };
  const max = Math.max(...series.map(s=>s.spend));
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const groupW = innerW / series.length;
  const barW = Math.min(20, groupW * 0.4);
  const ticks = 4;
  return (
    <div className="w-full overflow-hidden -mx-1">
      <svg viewBox={`0 0 ${w} ${h}`} className="w-full">
        {Array.from({length: ticks+1}).map((_,i) => {
          const y = pad.t + (innerH/ticks)*i;
          const v = max - (max/ticks)*i;
          return (
            <g key={i}>
              <line x1={pad.l} x2={w-pad.r} y1={y} y2={y} stroke="hsl(var(--border))" strokeDasharray="2 4"/>
              <text x={pad.l-6} y={y+3} textAnchor="end" fontSize="9" fill="hsl(var(--muted-fg))">{Math.round(v/1000)}k</text>
            </g>
          );
        })}
        {series.map((s, i) => {
          const cx = pad.l + groupW * i + groupW/2;
          const bhSpend = (s.spend/max) * innerH;
          const bhVat = (s.vat/max) * innerH;
          return (
            <g key={i}>
              <rect x={cx-barW-1} y={pad.t+innerH-bhSpend} width={barW} height={bhSpend} rx={3} fill="#6366f1" opacity={i===series.length-1?1:0.85}/>
              <rect x={cx+1} y={pad.t+innerH-bhVat} width={barW} height={bhVat} rx={3} fill="#a855f7" opacity="0.75"/>
              <text x={cx} y={h-pad.b+14} textAnchor="middle" fontSize="9.5" fill="hsl(var(--muted-fg))">{s.m}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function DonutChart({ data }) {
  const total = data.reduce((s,d)=>s+d.value, 0);
  let acc = 0;
  const r = 70, cx = 100, cy = 100, stroke = 22;
  const C = 2 * Math.PI * r;
  return (
    <div className="flex items-center justify-center my-4">
      <svg width="200" height="200" viewBox="0 0 200 200">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="hsl(var(--muted))" strokeWidth={stroke}/>
        {data.map((d, i) => {
          const frac = d.value / total;
          const dash = frac * C;
          const offset = -acc * C;
          acc += frac;
          return <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={d.color} strokeWidth={stroke} strokeDasharray={`${dash} ${C-dash}`} strokeDashoffset={offset} transform={`rotate(-90 ${cx} ${cy})`}/>;
        })}
        <text x={cx} y={cy-2} textAnchor="middle" fontSize="11" fill="hsl(var(--muted-fg))">รวม</text>
        <text x={cx} y={cy+18} textAnchor="middle" fontSize="18" fontWeight="700" fill="hsl(var(--fg))">{fmtTHB(total).replace('.00','')}</text>
      </svg>
    </div>
  );
}

function LineChart({ series }) {
  const w = 760, h = 200, pad = { l: 40, r: 12, t: 16, b: 28 };
  const max = Math.max(...series.map(s=>s.vat));
  const innerW = w - pad.l - pad.r;
  const innerH = h - pad.t - pad.b;
  const pts = series.map((s, i) => {
    const x = pad.l + (innerW / (series.length-1)) * i;
    const y = pad.t + innerH - (s.vat/max) * innerH;
    return [x, y];
  });
  const d = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const area = d + ` L ${pts[pts.length-1][0]} ${pad.t+innerH} L ${pts[0][0]} ${pad.t+innerH} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="w-full mt-3">
      <defs>
        <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#6366f1" stopOpacity="0.25"/><stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[0,1,2,3,4].map(i => {
        const y = pad.t + (innerH/4)*i;
        return <line key={i} x1={pad.l} x2={w-pad.r} y1={y} y2={y} stroke="hsl(var(--border))" strokeDasharray="2 4"/>;
      })}
      <path d={area} fill="url(#lineGrad)"/>
      <path d={d} fill="none" stroke="#6366f1" strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r={3.5} fill="white" stroke="#6366f1" strokeWidth={2}/>)}
      {series.map((s, i) => {
        const x = pad.l + (innerW / (series.length-1)) * i;
        return <text key={i} x={x} y={h-pad.b+14} textAnchor="middle" fontSize="9.5" fill="hsl(var(--muted-fg))">{s.m}</text>;
      })}
    </svg>
  );
}

Object.assign(window, { AnalyticsScreen });
</script>

function SplitCard({ split, lang, onShare, lineConnected }) {
  const share = split.total / split.people.length;
  const unsettled = split.people.filter(p => !split.settled[p]);
  const settledAll = unsettled.length === 0;
  const youOwe = split.payer !== 'me' && !split.settled.me;
  const payer = SPLIT_PEOPLE.find(p => p.id === split.payer);

  return (
    <Card className="p-5">
      <div className="flex items-start gap-3">
        <div className="h-11 w-11 rounded-[12px] bg-muted text-2xl flex items-center justify-center shrink-0">{split.emoji}</div>
        <div className="flex-1 min-w-0">
          <div className="flex items-start justify-between gap-2">
            <div className="min-w-0">
              <div className="text-[14.5px] font-semibold text-fg truncate">{split.vendor}</div>
              <div className="text-[11.5px] text-muted-fg">{fmtDate(split.date, lang)} · {lang==='th'?'หาร':'split'} {split.people.length} {lang==='th'?'คน':'ways'}</div>
            </div>
            <div className="text-right shrink-0">
              <div className="text-[16px] font-bold text-fg tabular-nums">฿{fmtN(split.total)}</div>
              <div className="text-[10.5px] text-muted-fg">฿{fmtN(share)} {lang==='th'?'/คน':'/person'}</div>
            </div>
          </div>
          {split.note ? <div className="text-[12px] text-muted-fg mt-1 italic">"{split.note}"</div> : null}
        </div>
      </div>

      <div className="mt-3 flex items-center gap-1.5 flex-wrap">
        {split.people.map(pid => {
          const p = SPLIT_PEOPLE.find(x => x.id === pid);
          const paid = split.settled[pid];
          return (
            <span key={pid} className={"inline-flex items-center gap-1 pl-1 pr-2 py-0.5 rounded-full text-[10.5px] font-medium border " + (paid ? 'bg-emerald-50 border-emerald-500/30 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300' : 'bg-muted border-default text-muted-fg')}>
              <span className="text-[12px]">{p.emoji}</span>
              {p.id === 'me' ? (lang==='th'?'คุณ':'You') : p.name}
              {paid ? <Icon.Check size={10}/> : null}
            </span>
          );
        })}
      </div>

      <div className="mt-3 pt-3 border-t border-default flex items-center justify-between gap-2">
        <div className="text-[11.5px] text-muted-fg">
          {settledAll
            ? <span className="text-emerald-600 dark:text-emerald-400 font-semibold inline-flex items-center gap-1"><Icon.CheckCircle size={12}/> {lang==='th'?'เคลียร์ครบ':'All settled'}</span>
            : youOwe
              ? <span className="text-rose-600 dark:text-rose-400 font-semibold">{lang==='th'?`คุณต้องคืน ${payer.name}`:`You owe ${payer.name}`} <span className="tabular-nums">฿{fmtN(share)}</span></span>
              : <span><b className="text-fg">{unsettled.length}</b> {lang==='th'?'คนยังไม่จ่าย':'still owe you'}</span>}
        </div>
        <div className="flex items-center gap-1.5">
          {onShare ? (
            <button onClick={onShare} className="h-8 px-2.5 rounded-[8px] bg-[#06C755]/10 hover:bg-[#06C755]/20 text-[#06C755] text-[11.5px] font-bold inline-flex items-center gap-1.5 transition">
              <span className="h-4 w-4 rounded-full bg-[#06C755] text-white flex items-center justify-center text-[8px] font-bold">L</span>
              {lang==='th'?'ส่งใน LINE':'Send to LINE'}
            </button>
          ) : null}
          {!settledAll && split.payer === 'me' ? (
            <Button size="sm" variant="outline" leftIcon={<Icon.QrCode size={12}/>}>{lang==='th'?'ทวง':'Remind'}</Button>
          ) : null}
          {youOwe ? (
            <Button size="sm" leftIcon={<Icon.QrCode size={12}/>}>{lang==='th'?'จ่ายคืน':'Pay back'}</Button>
          ) : null}
          {settledAll ? <Button size="sm" variant="ghost">{lang==='th'?'ดูสรุป':'View'}</Button> : null}
        </div>
      </div>
    </Card>
  );
}

          <div className="mt-1.5 flex items-baseline justify-between">
            <div className="text-[12.5px] text-fg">{lang==='th'?'แต่ละคนต้องจ่าย':'Each person pays'}</div>
            <div className="text-[22px] font-bold text-brand-600 dark:text-brand-300 tabular-nums">฿{fmtN(share)}</div>
          </div>
          <div className="text-[11px] text-muted-fg mt-0.5">{lang==='th'?`ยอดรวม ฿${fmtN(total)} หาร ${picked.length} คน`:`Total ฿${fmtN(total)} ÷ ${picked.length} people`}</div>
        </div>
      </div>

      <div className="p-4 border-t border-default flex items-center justify-end gap-2">
        <Button variant="ghost" onClick={onClose}>{lang==='th'?'ยกเลิก':'Cancel'}</Button>
        <Button leftIcon={<Icon.QrCode size={14}/>}>{lang==='th'?'สร้างและส่ง QR':'Create & share QR'}</Button>

function MiniQR({ size = 60 }) {
  // 21x21 QR-like pattern (decorative only)
  const rows = 21;
  const pattern = useMemo(() => {
    const arr = [];
    for (let y = 0; y < rows; y++) {
      const row = [];
      for (let x = 0; x < rows; x++) {
        const isFinder = (x < 7 && y < 7) || (x >= rows-7 && y < 7) || (x < 7 && y >= rows-7);
        if (isFinder) {
          const lx = x % rows, ly = y % rows;
          const fx = lx >= rows-7 ? lx - (rows-7) : lx;
          const fy = ly >= rows-7 ? ly - (rows-7) : ly;
          const inFinder = (fx === 0 || fx === 6 || fy === 0 || fy === 6) || (fx >= 2 && fx <= 4 && fy >= 2 && fy <= 4);
          row.push(inFinder ? 1 : 0);
        } else {
          // deterministic pseudo-random
          row.push((Math.sin(x*7.3 + y*3.7) * 1000) % 2 < 0.5 ? 1 : 0);
        }
      }
      arr.push(row);
    }
    return arr;
  }, []);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${rows} ${rows}`} className="rounded">
      <rect width={rows} height={rows} fill="#ffffff"/>
      {pattern.map((row, y) => row.map((c, x) => c ? <rect key={`${x}-${y}`} x={x} y={y} width="1" height="1" fill="#1e1b4b"/> : null))}
    </svg>
  );
}

// shade(hex, amount): lighten (>0) or darken (<0) a hex color. amount in [-1,1].
function shade(hex, amt) {
  const h = hex.replace('#','');
  const f = parseInt(h.length === 3 ? h.split('').map(c => c+c).join('') : h, 16);
  let r = (f >> 16) & 0xff, g = (f >> 8) & 0xff, b = f & 0xff;
  if (amt >= 0) { r = Math.round(r + (255 - r) * amt); g = Math.round(g + (255 - g) * amt); b = Math.round(b + (255 - b) * amt); }
  else { const k = 1 + amt; r = Math.round(r * k); g = Math.round(g * k); b = Math.round(b * k); }
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function groupByDay(items, lang) {
  const groups = {};
  const today = new Date(); today.setHours(0,0,0,0);
  items.forEach((n) => {
    const d = new Date(n.time); d.setHours(0,0,0,0);
    const diff = (today - d) / 86400000;
    const key = diff === 0 ? (lang==='th'?'วันนี้':'Today') : diff === 1 ? (lang==='th'?'เมื่อวาน':'Yesterday') : diff < 7 ? (lang==='th'?'สัปดาห์นี้':'This week') : (lang==='th'?'ก่อนหน้า':'Earlier');
    (groups[key] = groups[key] || []).push(n);
  });
  return groups;
}

                <span className="text-[11px] text-muted-fg flex items-center gap-1"><Icon.Clock size={11}/>{a.time} {lang==='th'?'นาที':'min'}</span>

function HelpArticleView({ article, onBack, onOpen, lang }) {
  const topic = HELP_TOPICS.find(t => t.id === article.topic);
  const body = lang === 'th' ? article.bodyTh : article.bodyEn;
  const others = HELP_ARTICLES.filter(a => a.topic === article.topic && a.id !== article.id).slice(0, 4);
  const [helpful, setHelpful] = useState(null);

  return (
    <div className="p-6 lg:p-7 max-w-[780px] space-y-6">
      {/* Breadcrumb */}
      <div className="flex items-center gap-1.5 text-[12px] text-muted-fg">
        <button onClick={onBack} className="hover:text-fg inline-flex items-center gap-1 transition"><Icon.ChevronLeft size={12}/> {lang==='th'?topic.th:topic.en}</button>
      </div>

      {/* Header */}
      <header className="space-y-3">
        <Badge tone="brand" className="!text-[10.5px]" style={{ background: topic.color+'18', color: topic.color }}>
          {React.createElement(Icon[topic.icon], { size: 10 })} {lang==='th'?topic.th:topic.en}
        </Badge>
        <h1 className="text-[28px] font-bold text-fg tracking-tight leading-tight">{lang==='th'?article.th:article.en}</h1>
        <p className="text-[15px] text-muted-fg leading-relaxed">{lang==='th'?article.exTh:article.exEn}</p>
        <div className="flex items-center gap-3 text-[11.5px] text-muted-fg pt-1">
          <span className="inline-flex items-center gap-1"><Icon.Clock size={12}/> {article.time} {lang==='th'?'นาทีอ่าน':'min read'}</span>
          <span>·</span>
          <span>{lang==='th'?'อัปเดต 12 พ.ค. 2569':'Updated 12 May 2026'}</span>
        </div>
      </header>

      {/* Body */}
      <article className="prose-slippy space-y-4">
        {body.map((b, i) => <ArticleBlock key={i} block={b} lang={lang}/>)}
      </article>

      {/* Feedback */}
      <Card className="p-5 bg-muted/40">
        <div className="text-[13px] font-semibold text-fg">{lang==='th'?'บทความนี้ช่วยคุณได้ไหม?':'Was this helpful?'}</div>
        {helpful === null ? (
          <div className="mt-3 flex items-center gap-2">
            <Button variant="outline" size="sm" leftIcon={<span>👍</span>} onClick={()=>setHelpful('yes')}>{lang==='th'?'มีประโยชน์':'Yes'}</Button>
            <Button variant="outline" size="sm" leftIcon={<span>👎</span>} onClick={()=>setHelpful('no')}>{lang==='th'?'ไม่ค่อย':'Not really'}</Button>
          </div>
        ) : (
          <div className="mt-2 text-[12px] text-muted-fg">{helpful==='yes' ? (lang==='th'?'ขอบคุณสำหรับ feedback!':'Thanks for the feedback!') : (lang==='th'?'ขอบคุณ — เราจะปรับปรุงบทความนี้':'Thanks — we\'ll improve this article')}</div>
        )}
      </Card>

      {/* Related */}
      {others.length > 0 ? (
        <div>
          <h3 className="text-[13px] font-semibold text-fg mb-2">{lang==='th'?'บทความที่เกี่ยวข้อง':'Related articles'}</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
            {others.map(a => (
              <button key={a.id} onClick={()=>onOpen(a)} className="text-left p-3 rounded-[10px] border border-default hover:border-brand-300 hover:bg-muted/40 transition">
                <div className="text-[12.5px] font-semibold text-fg">{lang==='th'?a.th:a.en}</div>
                <div className="text-[11px] text-muted-fg mt-0.5 line-clamp-1">{lang==='th'?a.exTh:a.exEn}</div>
              </button>
            ))}
          </div>
        </div>
      ) : null}
    </div>
  );
}

function ArticleBlock({ block, lang }) {
  if (block.p) return <p className="text-[14.5px] text-fg/90 leading-[1.7]" style={{ textWrap:'pretty' }}>{block.p}</p>;
  if (block.h) return <h2 className="text-[18px] font-bold text-fg tracking-tight pt-2">{block.h}</h2>;
  if (block.ol) return (
    <ol className="space-y-2 list-none">
      {block.ol.map((item, i) => (
        <li key={i} className="flex items-start gap-3 text-[14px] text-fg/90 leading-[1.7]">
          <span className="h-6 w-6 rounded-full bg-brand-500/15 text-brand-700 dark:text-brand-300 text-[11px] font-bold flex items-center justify-center shrink-0 mt-0.5 tabular-nums">{i+1}</span>
          <span style={{ textWrap:'pretty' }}>{item}</span>
        </li>
      ))}
    </ol>
  );
  if (block.ul) return (
    <ul className="space-y-1.5">
      {block.ul.map((item, i) => (
        <li key={i} className="flex items-start gap-2.5 text-[14px] text-fg/90 leading-[1.7]">
          <span className="h-1.5 w-1.5 rounded-full bg-brand-500 mt-[10px] shrink-0"></span>
          <span style={{ textWrap:'pretty' }}>{item}</span>
        </li>
      ))}
    </ul>
  );
  if (block.tip) return (
    <div className="rounded-[10px] bg-emerald-500/10 border-l-2 border-emerald-500 px-4 py-3 text-[13.5px] text-fg/90 flex items-start gap-2.5 leading-relaxed">
      <Icon.Sparkles size={14} className="text-emerald-600 dark:text-emerald-400 mt-0.5 shrink-0"/>
      <div><b className="text-emerald-700 dark:text-emerald-300">{lang==='th'?'เคล็ดลับ ':'Tip '}</b>{block.tip}</div>
    </div>
  );
  if (block.warn) return (
    <div className="rounded-[10px] bg-amber-500/10 border-l-2 border-amber-500 px-4 py-3 text-[13.5px] text-fg/90 flex items-start gap-2.5 leading-relaxed">
      <Icon.AlertTriangle size={14} className="text-amber-600 dark:text-amber-400 mt-0.5 shrink-0"/>
      <div><b className="text-amber-700 dark:text-amber-300">{lang==='th'?'ข้อควรระวัง ':'Heads up '}</b>{block.warn}</div>
    </div>
  );
  return null;
}

// Mock QR code pattern (visual only)
function QrCodePattern({ code }) {
  const cells = 21;
  const grid = useMemo(() => {
    let seed = 0;
    for (let i = 0; i < code.length; i++) seed = seed * 31 + code.charCodeAt(i);
    const r = (n) => { seed = (seed * 9301 + 49297) % 233280; return seed/233280 < n; };
    return Array.from({length: cells}, () => Array.from({length: cells}, () => r(0.45)));
  }, [code]);
  const corners = [[0,0],[0,cells-7],[cells-7,0]];
  const isFinder = (x,y) => corners.some(([cx,cy]) => x>=cx && x<cx+7 && y>=cy && y<cy+7);
  return (
    <svg viewBox={`0 0 ${cells} ${cells}`} className="w-full h-full p-2">
      <rect x="0" y="0" width={cells} height={cells} fill="white"/>
      {grid.map((row, y) => row.map((on, x) => (!isFinder(x,y) && on ? <rect key={x+'-'+y} x={x} y={y} width="1" height="1" fill="#0f172a"/> : null)))}
      {corners.map(([cx,cy], i) => (
        <g key={i}>
          <rect x={cx} y={cy} width="7" height="7" fill="none" stroke="#0f172a" strokeWidth="1"/>
          <rect x={cx+2} y={cy+2} width="3" height="3" fill="#0f172a"/>
        </g>
      ))}
    </svg>
  );
}

    const name = orgType === 'business' ? (data.name || 'My Workspace') : (data.personalName || 'Personal');

    setStage('app');

  const handleLogout = () => { setUser(null); setStage('login'); setRoute('dashboard'); setReviewDoc(null); };

  // Stages

  if (stage === 'register') return <AuthShell><RegisterScreen onRegistered={handleRegister} onGoLogin={() => setStage('login')}/></AuthShell>;
  if (stage === 'onboarding') return <OnboardingScreen user={user} onDone={handleOnboarded}/>;

  // Review takes over full main area
  if (reviewDoc) {
    return (
      <AppShell
        route="documents" setRoute={(r) => { setReviewDoc(null); setRoute(r); }}

    documents: { th:'เอกสารทั้งหมด', en:'All documents', sub_th:'ค้นหา กรอง และจัดการเอกสารของคุณ', sub_en:'Search, filter and manage your documents' },
    analytics: { th:'รายงาน', en:'Analytics', sub_th:'สถิติและเทรนด์ค่าใช้จ่าย', sub_en:'Statistics and spending trends' },
    tax: { th:'ภาษี', en:'Tax', sub_th:'สรุป VAT, WHT และแบบนำส่ง', sub_en:'VAT, WHT and filing summary' },
    vendors: { th:'ผู้ขาย', en:'Vendors', sub_th:'รายชื่อผู้ขายทั้งหมดและสถิติการใช้จ่าย', sub_en:'All vendors and spend statistics' },
    mobile: { th:'มือถือ', en:'Mobile', sub_th:'แอปบนมือถือสำหรับถ่ายใบเสร็จที่ร้าน', sub_en:'Snap receipts at the counter' },
    notifications: { th:'การแจ้งเตือน', en:'Notifications', sub_th:'รวมทุกการแจ้งเตือนของบัญชีคุณ', sub_en:'All notifications in one place' },
    profile: { th:'โปรไฟล์ของฉัน', en:'My profile', sub_th:'ข้อมูลส่วนตัว ความปลอดภัย และความเป็นส่วนตัว', sub_en:'Personal info, security and privacy' },

    billing: { th:'การชำระเงิน', en:'Billing', sub_th:'แพ็กเกจ การใช้งาน และใบกำกับ', sub_en:'Plan, usage and invoices' },

function UploadModal({ open, onClose }) {
  const { lang } = useLang();
  const { toast } = useToast();
  const [files, setFiles] = useState([]);
  const inputRef = useRef(null);
  const [drag, setDrag] = useState(false);

  useEffect(() => { if (!open) { setFiles([]); setDrag(false); } }, [open]);

  const onPick = () => inputRef.current?.click();
  const onChange = (e) => {
    const f = Array.from(e.target.files || []).map((file) => ({
      name: file.name, size: file.size, status: 'uploading', progress: 0,
    }));
    addFiles(f);
  };
  const addFiles = (list) => {
    setFiles((prev) => [...prev, ...list]);
    // Simulated processing
    list.forEach((f, i) => {
      const tick = setInterval(() => {
        setFiles((cur) => cur.map((x) => x.name === f.name ? { ...x, progress: Math.min(100, x.progress + 18) } : x));
      }, 200);
      setTimeout(() => {
        clearInterval(tick);
        setFiles((cur) => cur.map((x) => x.name === f.name ? { ...x, progress: 100, status: 'processing' } : x));
        setTimeout(() => {
          setFiles((cur) => cur.map((x) => x.name === f.name ? { ...x, status: 'done' } : x));
        }, 900 + i*200);
      }, 1500);
    });
  };

  const fakeDrop = () => {
    const demo = [
      { name: 'receipt-makro-0518.jpg', size: 184320 },
      { name: 'invoice-truemove-may.pdf', size: 92160 },
    ].map(d => ({ ...d, status: 'uploading', progress: 0 }));
    addFiles(demo);
  };

  return (
    <Modal open={open} onClose={onClose} size="lg">
      <div className="p-6">
        <div className="flex items-start justify-between mb-5">
          <div>
            <h3 className="text-[18px] font-semibold text-fg">{lang==='th'?'อัปโหลดเอกสาร':'Upload documents'}</h3>
            <p className="text-[12.5px] text-muted-fg mt-0.5">{lang==='th'?'AI จะอ่านและดึงข้อมูลให้ภายในไม่กี่วินาที':'AI will read and extract details in seconds'}</p>
          </div>
          <button onClick={onClose} className="h-9 w-9 rounded-[10px] hover:bg-muted flex items-center justify-center text-muted-fg"><Icon.X size={17}/></button>
        </div>

        <div
          onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={(e) => { e.preventDefault(); setDrag(false); fakeDrop(); }}
          onClick={onPick}
          className={"relative cursor-pointer rounded-[14px] border-2 border-dashed p-10 text-center transition " + (drag ? 'border-brand-500 bg-brand-50/50 dark:bg-brand-500/10' : 'border-default hover:border-brand-400 hover:bg-muted/40')}>
          <input ref={inputRef} type="file" multiple accept="application/pdf,image/*" className="hidden" onChange={onChange}/>
          <div className="relative inline-flex">
            <div className="absolute inset-0 rounded-full bg-brand-500/30 blur-2xl"></div>
            <div className="relative h-14 w-14 rounded-[14px] bg-gradient-to-br from-brand-400 to-brand-700 text-white flex items-center justify-center shadow-lg shadow-brand-500/30">
              <Icon.UploadCloud size={24}/>
            </div>
          </div>
          <h4 className="mt-4 text-[16px] font-semibold text-fg">{lang==='th'?'ลากไฟล์มาวางที่นี่ หรือคลิกเพื่อเลือก':'Drop files or click to browse'}</h4>
          <p className="mt-1 text-[12.5px] text-muted-fg">PDF, JPG, PNG · {lang==='th'?'สูงสุด':'max'} 20 MB · {lang==='th'?'อัปโหลดได้หลายไฟล์':'multi-file'}</p>
          <div className="mt-4 flex items-center justify-center gap-4 text-[11.5px] text-muted-fg flex-wrap">
            <span className="inline-flex items-center gap-1.5"><Icon.Camera size={13}/> {lang==='th'?'ถ่ายรูป':'Take photo'}</span>
            <span className="inline-flex items-center gap-1.5"><Icon.Mail size={13}/> docs+{Math.random().toString(36).slice(2,7)}@in.slippy.app</span>
            <span className="inline-flex items-center gap-1.5"><Icon.QrCode size={13}/> {lang==='th'?'ส่งทาง LINE':'Via LINE'}</span>
          </div>
        </div>

        {files.length > 0 ? (
          <div className="mt-5 space-y-2 max-h-[260px] overflow-y-auto scrollbar-thin">
            {files.map((f, i) => (
              <div key={i} className="flex items-center gap-3 p-3 rounded-[10px] bg-muted/50">
                <span className="h-9 w-9 rounded-[8px] bg-card border border-default flex items-center justify-center text-lg">{f.name.endsWith('.pdf') ? '📄' : '🖼️'}</span>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center justify-between gap-3">
                    <div className="text-[13px] font-medium text-fg truncate">{f.name}</div>
                    <div className="text-[11px] text-muted-fg shrink-0">{(f.size/1024).toFixed(0)} KB</div>
                  </div>
                  {f.status === 'uploading' ? (
                    <div className="mt-1.5 h-1.5 rounded-full bg-card overflow-hidden">
                      <div className="h-full bg-brand-500 transition-all" style={{ width: f.progress + '%' }}></div>
                    </div>
                  ) : f.status === 'processing' ? (
                    <div className="mt-1 text-[11.5px] text-brand-600 dark:text-brand-300 inline-flex items-center gap-1.5"><Icon.Sparkles size={11}/> {lang==='th'?'AI กำลังอ่านเอกสาร...':'AI extracting data...'}</div>
                  ) : (
                    <div className="mt-1 text-[11.5px] text-emerald-600 dark:text-emerald-400 inline-flex items-center gap-1.5"><Icon.CheckCircle size={11}/> {lang==='th'?'พร้อมตรวจสอบแล้ว · 94% accuracy':'Ready for review · 94% accuracy'}</div>
                  )}
                </div>
              </div>
            ))}
          </div>
        ) : null}

        <div className="mt-5 flex items-center justify-end gap-2">
          <Button variant="ghost" onClick={onClose}>{lang==='th'?'ปิด':'Close'}</Button>
          <Button onClick={() => { onClose(); toast(lang==='th'?`อัปโหลดเสร็จ ${files.length || 1} เอกสาร`:`${files.length || 1} document(s) uploaded`, { kind:'success' }); }}>{lang==='th'?'เสร็จสิ้น':'Done'}</Button>
        </div>
      </div>
    </Modal>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <ThemeProvider>
    <LangProvider>
      <ToastProvider>
        <App/>
      </ToastProvider>
    </LangProvider>
  </ThemeProvider>
);
</script>
</body>
</html>

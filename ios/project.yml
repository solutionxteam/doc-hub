name: Slippy

options:
  bundleIdPrefix: app.slippy
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.3.0"

targets:
  Slippy:
    type: application
    platform: iOS
    sources:
      - path: Slippy
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.slippy.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: Slippy/App/Info.plist
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    info:
      path: Slippy/App/Info.plist
      properties:
        CFBundleDisplayName: Slippy
        CFBundleShortVersionString: "1.0.0"
        NSCameraUsageDescription: "ถ่ายภาพเอกสารเพื่ออัปโหลดเข้าระบบ Slippy"
        NSPhotoLibraryUsageDescription: "เลือกรูปเอกสารจากคลังภาพ"
        NSFaceIDUsageDescription: "ใช้ Face ID เพื่อเข้าสู่ระบบ Slippy อย่างปลอดภัย"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

schemes:
  Slippy:
    build:
      targets:
        Slippy: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

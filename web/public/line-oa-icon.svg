<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- LINE OA profile image — square 300×300 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.25" cy="0.15" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slip" x1="88" y1="80" x2="212" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eaf6"/>
    </linearGradient>
  </defs>

  <!-- Background (no radius — LINE OA handles clipping) -->
  <rect width="300" height="300" fill="url(#bg)"/>
  <rect width="300" height="300" fill="url(#shine)"/>

  <!-- Centered mascot -->
  <g transform="translate(150,148) rotate(-8) translate(-150,-148)">
    <!-- Receipt shadow -->
    <path d="M104 78 L196 78 Q212 78 212 94 L212 188 L203 198 L194 188 L185 198 L176 188 L167 198 L158 188 L149 198 L140 188 L131 198 L122 188 L110 198 L88 198 L88 94 Q88 78 104 78 Z"
          fill="#1e1b4b" fill-opacity="0.18" transform="translate(3.5 5)"/>
    <!-- Receipt body -->
    <path d="M104 78 L196 78 Q212 78 212 94 L212 188 L203 198 L194 188 L185 198 L176 188 L167 198 L158 188 L149 198 L140 188 L131 198 L122 188 L110 198 L88 198 L88 94 Q88 78 104 78 Z"
          fill="url(#slip)"/>
    <!-- Eyes -->
    <circle cx="128" cy="130" r="9" fill="#1e1b4b"/>
    <circle cx="172" cy="130" r="9" fill="#1e1b4b"/>
    <circle cx="131" cy="127" r="2.5" fill="white" fill-opacity="0.65"/>
    <circle cx="175" cy="127" r="2.5" fill="white" fill-opacity="0.65"/>
    <!-- Blush -->
    <circle cx="115" cy="148" r="7.5" fill="#fb7185" fill-opacity="0.5"/>
    <circle cx="185" cy="148" r="7.5" fill="#fb7185" fill-opacity="0.5"/>
    <!-- Smile -->
    <path d="M128 152 Q150 170 172 152" stroke="#1e1b4b" stroke-width="9" stroke-linecap="round" fill="none"/>
  </g>

  <!-- "Slippy" wordmark at bottom -->
  <text x="150" y="272" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="700"
        fill="white" fill-opacity="0.92" text-anchor="middle" letter-spacing="1">Slippy</text>
</svg>

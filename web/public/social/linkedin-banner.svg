<svg viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- LinkedIn Company Banner — 1128×191 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#3730a3"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="12%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="820" y1="10" x2="1118" y2="181" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e1b4b" flood-opacity="0.25"/></filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.8" fill="#ffffff" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#glow)"/>
  <rect width="1128" height="191" fill="url(#dots)"/>

  <!-- Icon mark -->
  <g transform="translate(32, 44)">
    <rect width="64" height="64" rx="14" fill="#ffffff" fill-opacity="0.16"/>
    <g transform="translate(32,30) rotate(-5) translate(-32,-30)">
      <path d="M18 12 L46 12 Q50 12 50 16 L50 44 L47 48 L44 44 L41 48 L38 44 L35 48 L32 44 L29 48 L26 44 L23 48 L13 48 L13 16 Q13 12 18 12 Z" fill="#ffffff" fill-opacity="0.95"/>
      <circle cx="23" cy="26" r="3" fill="#1e1b4b"/>
      <circle cx="41" cy="26" r="3" fill="#1e1b4b"/>
      <ellipse cx="19" cy="31" rx="3" ry="1.8" fill="#fb7185" fill-opacity="0.5"/>
      <ellipse cx="45" cy="31" rx="3" ry="1.8" fill="#fb7185" fill-opacity="0.5"/>
      <path d="M23 33 Q32 39 41 33" stroke="#1e1b4b" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="32" y="145"
    font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
    font-size="52" font-weight="800" letter-spacing="-1" fill="#ffffff">Slippy</text>

  <!-- Tagline -->
  <text x="34" y="170"
    font-family="system-ui,'Noto Sans Thai',sans-serif"
    font-size="14" font-weight="500" fill="#ffffff" fill-opacity="0.72">
    AI-Powered Accounting Document Management · PDPA Compliant · slippy.app
  </text>

  <!-- Receipt mascot (small, right) -->
  <g transform="translate(1030,96) rotate(-8) translate(-1030,-96)" filter="url(#sh)">
    <path d="M962 18 L1098 18 Q1128 18 1128 48 L1128 158 L1116 172 L1104 158 L1092 172 L1080 158 L1068 172 L1056 158 L1044 172 L1032 158 L1020 172 L932 172 L932 48 Q932 18 962 18 Z"
      fill="#1e1b4b" fill-opacity="0.18" transform="translate(4 6)"/>
    <path d="M962 18 L1098 18 Q1128 18 1128 48 L1128 158 L1116 172 L1104 158 L1092 172 L1080 158 L1068 172 L1056 158 L1044 172 L1032 158 L1020 172 L932 172 L932 48 Q932 18 962 18 Z"
      fill="url(#paper)"/>
    <rect x="950" y="55" width="96" height="5" rx="2.5" fill="#6366f1" fill-opacity="0.17"/>
    <circle cx="984" cy="90" r="13" fill="#1e1b4b"/>
    <circle cx="1046" cy="90" r="13" fill="#1e1b4b"/>
    <circle cx="989" cy="85" r="4" fill="#ffffff" fill-opacity="0.70"/>
    <circle cx="1051" cy="85" r="4" fill="#ffffff" fill-opacity="0.70"/>
    <ellipse cx="966" cy="108" rx="14" ry="9" fill="#fb7185" fill-opacity="0.44"/>
    <ellipse cx="1064" cy="108" rx="14" ry="9" fill="#fb7185" fill-opacity="0.44"/>
    <path d="M984 114 Q1015 136 1046 114"
          stroke="#1e1b4b" stroke-width="13" stroke-linecap="round" fill="none"/>
    <rect x="950" y="146" width="88" height="4" rx="2" fill="#6366f1" fill-opacity="0.12"/>
  </g>
</svg>

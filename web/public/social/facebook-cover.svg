<svg viewBox="0 0 820 312" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Facebook Page Cover Photo — 820×312 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="820" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <radialGradient id="gL" cx="15%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gR" cx="90%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="580" y1="20" x2="790" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1e1b4b" flood-opacity="0.30"/></filter>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="820" height="312" fill="url(#bg)"/>
  <rect width="820" height="312" fill="url(#gL)"/>
  <rect width="820" height="312" fill="url(#gR)"/>
  <rect width="820" height="312" fill="url(#dots)"/>

  <!-- Left: icon mark -->
  <g transform="translate(56, 76)">
    <rect width="80" height="80" rx="18" fill="#ffffff" fill-opacity="0.14"/>
    <!-- Mini mascot -->
    <g transform="translate(40,38) rotate(-6) translate(-40,-38)">
      <path d="M23 16 L57 16 Q63 16 63 22 L63 56 L59 61 L55 56 L51 61 L47 56 L43 61 L39 56 L35 61 L31 56 L27 61 L17 61 L17 22 Q17 16 23 16 Z" fill="#ffffff" fill-opacity="0.95"/>
      <circle cx="30" cy="34" r="4" fill="#1e1b4b"/>
      <circle cx="50" cy="34" r="4" fill="#1e1b4b"/>
      <circle cx="31.5" cy="32.5" r="1.3" fill="#ffffff" fill-opacity="0.7"/>
      <circle cx="51.5" cy="32.5" r="1.3" fill="#ffffff" fill-opacity="0.7"/>
      <ellipse cx="25" cy="41" rx="4" ry="2.5" fill="#fb7185" fill-opacity="0.5"/>
      <ellipse cx="55" cy="41" rx="4" ry="2.5" fill="#fb7185" fill-opacity="0.5"/>
      <path d="M30 43 Q40 51 50 43" stroke="#1e1b4b" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="56" y="198"
    font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
    font-size="62" font-weight="800" letter-spacing="-1.5" fill="#ffffff">Slippy</text>

  <!-- Tagline -->
  <text x="58" y="232"
    font-family="system-ui,-apple-system,'Noto Sans Thai',sans-serif"
    font-size="18" font-weight="500" fill="#ffffff" fill-opacity="0.78">
    ระบบจัดการเอกสารบัญชีอัจฉริยะ ด้วย AI
  </text>

  <!-- Pills row -->
  <g transform="translate(56, 252)">
    <rect width="100" height="28" rx="14" fill="#ffffff" fill-opacity="0.14"/>
    <text x="50" y="18.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#ffffff">🤖 AI OCR</text>
    <rect x="113" width="116" height="28" rx="14" fill="#ffffff" fill-opacity="0.14"/>
    <text x="171" y="18.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#ffffff">📊 Analytics</text>
    <rect x="242" width="106" height="28" rx="14" fill="#ffffff" fill-opacity="0.14"/>
    <text x="295" y="18.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#ffffff">🔗 LINE Bot</text>
    <rect x="361" width="118" height="28" rx="14" fill="#10b981" fill-opacity="0.22"/>
    <text x="420" y="18.5" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#6ee7b7">✓ PDPA</text>
  </g>

  <!-- Receipt mascot right -->
  <g transform="translate(685,156) rotate(-9) translate(-685,-156)" filter="url(#sh)">
    <path d="M593 36 L777 36 Q813 36 813 72 L813 258 L797 276 L781 258 L765 276 L749 258 L733 276 L717 258 L701 276 L685 258 L669 276 L653 258 L637 276 L557 276 L557 72 Q557 36 593 36 Z"
      fill="#1e1b4b" fill-opacity="0.20" transform="translate(6 12)"/>
    <path d="M593 36 L777 36 Q813 36 813 72 L813 258 L797 276 L781 258 L765 276 L749 258 L733 276 L717 258 L701 276 L685 258 L669 276 L653 258 L637 276 L557 276 L557 72 Q557 36 593 36 Z"
      fill="url(#paper)"/>
    <rect x="578" y="78" width="140" height="7" rx="3.5" fill="#6366f1" fill-opacity="0.17"/>
    <rect x="578" y="92" width="98"  height="5" rx="2.5" fill="#6366f1" fill-opacity="0.10"/>
    <circle cx="634" cy="148" r="24" fill="#1e1b4b"/>
    <circle cx="736" cy="148" r="24" fill="#1e1b4b"/>
    <circle cx="643" cy="138" r="8"  fill="#ffffff" fill-opacity="0.70"/>
    <circle cx="745" cy="138" r="8"  fill="#ffffff" fill-opacity="0.70"/>
    <ellipse cx="601" cy="178" rx="21" ry="14" fill="#fb7185" fill-opacity="0.45"/>
    <ellipse cx="769" cy="178" rx="21" ry="14" fill="#fb7185" fill-opacity="0.45"/>
    <path d="M634 188 Q685 224 736 188"
          stroke="#1e1b4b" stroke-width="22" stroke-linecap="round" fill="none"/>
    <rect x="578" y="236" width="128" height="6" rx="3" fill="#6366f1" fill-opacity="0.12"/>
    <rect x="578" y="248" width="90"  height="4" rx="2" fill="#6366f1" fill-opacity="0.08"/>
  </g>
</svg>

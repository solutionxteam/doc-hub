<svg viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    LinkedIn Company Logo — 300×300 (displayed as square with slight rounding)
    LinkedIn recommends 300×300 PNG, shown as ~60×60 in feeds, 100×100 on profile
    Keep content well inside the 300×300 — no circle crop, but slight corner radius shown
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#3730a3"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="glow" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="90" y1="55" x2="220" y2="245" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8eaf6"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#1e1b4b" flood-opacity="0.30"/></filter>
    <pattern id="dots" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="7.5" cy="7.5" r="0.55" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="300" height="300" rx="16" fill="url(#bg)"/>
  <rect width="300" height="300" rx="16" fill="url(#glow)"/>
  <rect width="300" height="300" rx="16" fill="url(#dots)"/>

  <!-- Receipt mascot — centered -->
  <g transform="translate(150,132) rotate(-5) translate(-150,-132)" filter="url(#sh)">
    <path d="M91 37 L209 37 Q224 37 224 52 L224 218
             L218 225 L212 218 L206 225 L200 218 L194 225 L188 218 L182 225 L176 218 L76 218 L76 52 Q76 37 91 37 Z"
      fill="#1e1b4b" fill-opacity="0.20" transform="translate(5 8)"/>
    <path d="M91 37 L209 37 Q224 37 224 52 L224 218
             L218 225 L212 218 L206 225 L200 218 L194 225 L188 218 L182 225 L176 218 L76 218 L76 52 Q76 37 91 37 Z"
      fill="url(#paper)"/>
    <rect x="84" y="66" width="64" height="6" rx="3" fill="#6366f1" fill-opacity="0.18"/>
    <circle cx="120" cy="124" r="18" fill="#1e1b4b"/>
    <circle cx="180" cy="124" r="18" fill="#1e1b4b"/>
    <circle cx="127" cy="117" r="6"  fill="#ffffff" fill-opacity="0.72"/>
    <circle cx="187" cy="117" r="6"  fill="#ffffff" fill-opacity="0.72"/>
    <ellipse cx="96"  cy="150" rx="16" ry="11" fill="#fb7185" fill-opacity="0.48"/>
    <ellipse cx="204" cy="150" rx="16" ry="11" fill="#fb7185" fill-opacity="0.48"/>
    <path d="M120 158 Q150 186 180 158"
          stroke="#1e1b4b" stroke-width="13" stroke-linecap="round" fill="none"/>
    <rect x="84" y="204" width="58" height="5" rx="2.5" fill="#6366f1" fill-opacity="0.13"/>
  </g>

  <!-- Wordmark -->
  <text x="150" y="272"
    text-anchor="middle"
    font-family="system-ui,-apple-system,'Helvetica Neue',sans-serif"
    font-size="30" font-weight="800" letter-spacing="-0.7" fill="#ffffff" fill-opacity="0.92">Slippy</text>
</svg>

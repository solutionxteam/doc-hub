<svg viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- App Store / Play Store icon — 1024×1024 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.45" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.22" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="paper" x1="300" y1="270" x2="724" y2="754" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8eaf6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="8" dy="16" stdDeviation="20" flood-color="#1e1b4b" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#shine)"/>

  <!-- Receipt mascot (centered, slightly rotated) -->
  <g transform="translate(512,500) rotate(-8) translate(-512,-500)" filter="url(#shadow)">
    <!-- Receipt shadow layer -->
    <path d="M356 270 L668 270 Q724 270 724 326 L724 642 L693 676 L662 642 L631 676 L600 642 L569 676 L538 642 L507 676 L476 642 L445 676 L414 642 L374 676 L300 676 L300 326 Q300 270 356 270 Z"
          fill="#1e1b4b" fill-opacity="0.16" transform="translate(12 18)"/>
    <!-- Receipt body -->
    <path d="M356 270 L668 270 Q724 270 724 326 L724 642 L693 676 L662 642 L631 676 L600 642 L569 676 L538 642 L507 676 L476 642 L445 676 L414 642 L374 676 L300 676 L300 326 Q300 270 356 270 Z"
          fill="url(#paper)"/>

    <!-- Lines on receipt (decorative) -->
    <rect x="336" y="316" width="220" height="8" rx="4" fill="#6366f1" fill-opacity="0.15"/>
    <rect x="336" y="336" width="160" height="6" rx="3" fill="#6366f1" fill-opacity="0.10"/>

    <!-- Eyes -->
    <circle cx="436" cy="448" r="32" fill="#1e1b4b"/>
    <circle cx="588" cy="448" r="32" fill="#1e1b4b"/>
    <!-- Eye shine -->
    <circle cx="446" cy="438" r="9" fill="white" fill-opacity="0.65"/>
    <circle cx="598" cy="438" r="9" fill="white" fill-opacity="0.65"/>
    <!-- Blush -->
    <circle cx="392" cy="508" r="26" fill="#fb7185" fill-opacity="0.48"/>
    <circle cx="632" cy="508" r="26" fill="#fb7185" fill-opacity="0.48"/>
    <!-- Smile -->
    <path d="M436 524 Q512 582 588 524" stroke="#1e1b4b" stroke-width="30" stroke-linecap="round" fill="none"/>

    <!-- Decorative lines below smile -->
    <rect x="336" y="614" width="180" height="6" rx="3" fill="#6366f1" fill-opacity="0.12"/>
    <rect x="336" y="628" width="120" height="5" rx="2.5" fill="#6366f1" fill-opacity="0.08"/>
  </g>
</svg>

<svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="10" y1="10" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.2" cy="0.15" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="slip" x1="52" y1="50" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <rect width="180" height="180" rx="40" fill="url(#shine)"/>
  <!-- Receipt with face, centered -->
  <g transform="translate(90,90) rotate(-7) translate(-90,-90)">
    <!-- shadow -->
    <path d="M63 48 L117 48 Q128 48 128 59 L128 116 L122 123 L116 116 L110 123 L104 116 L98 123 L92 116 L86 123 L80 116 L74 123 L68 116 L54 123 L54 59 Q54 48 63 48 Z"
          fill="#1e1b4b" fill-opacity="0.15" transform="translate(2 3)"/>
    <!-- receipt body -->
    <path d="M63 48 L117 48 Q128 48 128 59 L128 116 L122 123 L116 116 L110 123 L104 116 L98 123 L92 116 L86 123 L80 116 L74 123 L68 116 L54 123 L54 59 Q54 48 63 48 Z"
          fill="url(#slip)"/>
    <!-- eyes -->
    <circle cx="79" cy="80" r="5.5" fill="#1e1b4b"/>
    <circle cx="101" cy="80" r="5.5" fill="#1e1b4b"/>
    <!-- shine on eyes -->
    <circle cx="81" cy="78" r="1.5" fill="white" fill-opacity="0.6"/>
    <circle cx="103" cy="78" r="1.5" fill="white" fill-opacity="0.6"/>
    <!-- blush -->
    <circle cx="71" cy="92" r="4.5" fill="#fb7185" fill-opacity="0.5"/>
    <circle cx="109" cy="92" r="4.5" fill="#fb7185" fill-opacity="0.5"/>
    <!-- smile -->
    <path d="M79 94 Q90 106 101 94" stroke="#1e1b4b" stroke-width="5.5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
